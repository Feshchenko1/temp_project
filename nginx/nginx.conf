worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Rate Limiting: 15 req/sec per IP with burst 30
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=15r/s;

    server {
        listen 80;
        server_name localhost;

        # Disable emitting nginx version on error pages and Server header
        server_tokens off;

        # Global body size limit (2MB) for S3 offloading enforce
        client_max_body_size 2M;

        # Security Headers (CORS & HSTS)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Route API to Backend
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route WebSocket to Backend
        location /socket.io/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400; # Prevent websocket from dropping prematurely
            proxy_send_timeout 86400;
        }

        # Route all other to Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
