version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: harmonix-frontend
    restart: unless-stopped
    networks:
      - harmonix-net
    environment:
      - NODE_ENV=production
      - PORT=3000

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: harmonix-backend
    restart: unless-stopped
    networks:
      - harmonix-net
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}

  nginx:
    image: nginx:alpine
    container_name: harmonix-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - harmonix-net

networks:
  harmonix-net:
    driver: bridge
