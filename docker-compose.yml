version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: harmonix-frontend
    restart: unless-stopped
    networks:
      - harmonix-net
    environment:
      - NODE_ENV=production
      - PORT=3000
    deploy:
      resources:
        limits:
          memory: 1G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: harmonix-backend
    restart: unless-stopped
    networks:
      - harmonix-net
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
    deploy:
      resources:
        limits:
          memory: 2G
    depends_on:
      - db-init

  db-init:
    image: alpine
    command: [ "echo", "Database connection established" ]
    networks:
      - harmonix-net

  nginx:
    image: nginx:alpine
    container_name: harmonix-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - harmonix-net
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  harmonix-net:
    driver: bridge
